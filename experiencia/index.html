<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Voltte — a IA opera, você decide</title>
  <meta name="description" content="Role para atravessar a jornada do Voltte: do chão de fábrica à decisão. ERP AI-first para a indústria brasileira." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* Tema Voltte (manual v2 "A Presença"): grafite + cobre, IBM Plex. */
    :root, .sw-root {
      --sw-bg: #1a1d23;            /* == fundo grafite dos stills gerados */
      --sw-ink: #f3f1ee;
      --sw-ink-soft: #a9adb6;
      --sw-accent: #c9742d;        /* cobre primário; seções sobrescrevem */
      --sw-font-display: 'IBM Plex Sans', system-ui, sans-serif;
      --sw-font-body: 'IBM Plex Sans', system-ui, sans-serif;
    }
    /* Números/provas em Plex Mono (padrão da marca) */
    .sw-root .sw-tag { font-family: 'IBM Plex Mono', monospace; }
  </style>
</head>
<body>
  <div id="top"></div>
  <div id="world"></div>

  <script src="scrub-engine.js"></script>
  <script>
    mountScrollWorld(document.getElementById('world'), {
      brand: { name: 'Voltte', href: '#top' },
      cta: { label: 'Falar com o Voltte', href: '#contato' },
      hint: 'role para entrar',
      diveScroll: 1.3,
      crossfade: 0.12,             /* arquitetura A: legs encadeados, sem conectores */

        {
          id: 'industria', label: 'A indústria',

          clipMobile: 'assets/vid/leg_1-m.mp4',

          still: 'assets/scene_6.webp',
